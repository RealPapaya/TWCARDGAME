<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>寶島遊戲王 v2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Noto+Serif+TC:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <!-- Boot splash: inlined so it paints before the JS/CSS bundle loads. The
         preloader (apps/web/src/app/preloader.ts) drives the bar; startApp's
         first render replaces this whole subtree once assets are warm. -->
    <style>
      #preload-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: radial-gradient(circle at 50% 35%, #1c2233 0%, #0c0f17 70%, #070910 100%);
        color: #f3e7c8;
        font-family: "Noto Serif TC", "Cinzel", serif;
        text-align: center;
        padding: 24px;
      }
      #preload-screen .preload-title {
        font-family: "Cinzel", "Noto Serif TC", serif;
        font-size: clamp(22px, 4vw, 34px);
        font-weight: 800;
        letter-spacing: 0.12em;
        color: #e7c873;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
      }
      #preload-screen .preload-sub {
        font-size: 14px;
        letter-spacing: 0.3em;
        opacity: 0.75;
        animation: preload-pulse 1.6s ease-in-out infinite;
      }
      #preload-screen .preload-track {
        width: min(360px, 72vw);
        height: 8px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(231, 200, 115, 0.25);
      }
      #preload-screen #preload-bar {
        width: 0%;
        height: 100%;
        border-radius: 999px;
        background: linear-gradient(90deg, #b88a3a, #e7c873 60%, #fff3cf);
        transition: width 0.25s ease-out;
      }
      #preload-screen #preload-pct {
        font-size: 13px;
        letter-spacing: 0.18em;
        opacity: 0.85;
        font-variant-numeric: tabular-nums;
      }
      #preload-screen #preload-skip {
        margin-top: 8px;
        font-size: 13px;
        letter-spacing: 0.16em;
        color: #cdd6e6;
        background: transparent;
        border: 1px solid rgba(231, 200, 115, 0.4);
        border-radius: 999px;
        padding: 8px 22px;
        cursor: pointer;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.4s ease;
      }
      #preload-screen #preload-skip.preload-skip-visible {
        opacity: 0.85;
        pointer-events: auto;
      }
      #preload-screen #preload-skip:hover {
        color: #fff3cf;
        border-color: #e7c873;
      }
      @keyframes preload-pulse {
        0%, 100% { opacity: 0.45; }
        50% { opacity: 0.85; }
      }
      @media (prefers-reduced-motion: reduce) {
        #preload-screen .preload-sub { animation: none; }
        #preload-screen #preload-bar { transition: none; }
      }
    </style>
  </head>
  <body>
    <main id="app">
      <div id="preload-screen">
        <div class="preload-title">寶島遊戲王</div>
        <div class="preload-track"><div id="preload-bar"></div></div>
        <div id="preload-pct">0%</div>
        <div class="preload-sub">載入中…</div>
        <button type="button" id="preload-skip">略過並進入遊戲</button>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
