# Matches live in this process's memory. Keep a single machine for launch —
# multi-instance scaling needs the Colyseus Redis presence driver
# (see docs/phase3-multiplayer-reliability.md). Do not enable autoscaling.
app = "twcardgame"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "2567"

[[services]]
  protocol = "tcp"
  internal_port = 2567
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
    method = "get"
    path = "/health"
