name: Deploy

on:
  push:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    # Job-level `if:` cannot read `secrets.*` directly, so expose which
    # deploy credentials are configured as outputs for the deploy jobs to gate on.
    outputs:
      has-railway: ${{ steps.secrets.outputs.has-railway }}
      has-vercel: ${{ steps.secrets.outputs.has-vercel }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run validate:cards
      - run: npm test
      - run: npm run check
      - run: npm run build
      - name: Detect deploy credentials
        id: secrets
        run: |
          if [ -n "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "has-railway=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-railway=false" >> "$GITHUB_OUTPUT"
            echo "::warning::RAILWAY_TOKEN not set — skipping server deploy."
          fi
          if [ -n "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "has-vercel=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-vercel=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN not set — skipping web deploy."
          fi

  deploy-server:
    needs: test
    if: needs.test.outputs.has-railway == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-server
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service twcardgame-server --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  deploy-web:
    needs: test
    if: needs.test.outputs.has-vercel == 'true'
    runs-on: ubuntu-latest
    concurrency: deploy-web
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: npm install --global vercel@latest
      - run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      - run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
